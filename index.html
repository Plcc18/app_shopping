<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2D6A4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Carrinho">
<meta name="description" content="Lista de compras inteligente para toda a família">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<title>Carrinho 🛒</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="notif" class="notif"></div>

<!-- Install banner (shown on mobile) -->
<div id="install-banner" class="install-banner" style="display:none">
  <span>📲 Instale o app no seu celular!</span>
  <button onclick="installApp()">Instalar</button>
  <button onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<div class="app" id="app">

  <div class="header">
    <div class="logo">🛒 Carrinho</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Alternar tema">🌙</button>
      <button class="icon-btn" onclick="showPanel('history')" title="Histórico">📋</button>
      <button class="icon-btn" onclick="showPanel('compare')" title="Comparar preços">🏷️</button>
      <button class="icon-btn" onclick="shareList()" title="Compartilhar">📤</button>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span id="prog-text">0 itens comprados</span>
      <strong id="prog-pct">0%</strong>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="all" onclick="setTab('all',this)">Todos</div>
    <div class="tab" data-tab="🥦 Hortifruti" onclick="setTab('🥦 Hortifruti',this)">🥦 Hortifruti</div>
    <div class="tab" data-tab="🧼 Limpeza" onclick="setTab('🧼 Limpeza',this)">🧼 Limpeza</div>
    <div class="tab" data-tab="🥩 Carnes" onclick="setTab('🥩 Carnes',this)">🥩 Carnes</div>
    <div class="tab" data-tab="🥤 Bebidas" onclick="setTab('🥤 Bebidas',this)">🥤 Bebidas</div>
    <div class="tab" data-tab="🍞 Padaria" onclick="setTab('🍞 Padaria',this)">🍞 Padaria</div>
    <div class="tab" data-tab="🥫 Mercearia" onclick="setTab('🥫 Mercearia',this)">🥫 Mercearia</div>
    <div class="tab" data-tab="🧀 Laticínios" onclick="setTab('🧀 Laticínios',this)">🧀 Laticínios</div>
    <div class="tab" data-tab="❄️ Congelados" onclick="setTab('❄️ Congelados',this)">❄️ Congelados</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Buscar item..." oninput="renderList()" autocomplete="off">
  </div>

  <div class="add-form">
    <div class="add-card">
      <div class="add-row">
        <input id="inp-name" placeholder="Nome do produto" onkeydown="if(event.key==='Enter')addItem()" autocomplete="off">
        <select id="inp-cat">
          <option value="🥦 Hortifruti">🥦 Hortifruti</option>
          <option value="🧼 Limpeza">🧼 Limpeza</option>
          <option value="🥩 Carnes">🥩 Carnes</option>
          <option value="🥤 Bebidas">🥤 Bebidas</option>
          <option value="🍞 Padaria">🍞 Padaria</option>
          <option value="🥫 Mercearia" selected>🥫 Mercearia</option>
          <option value="🧀 Laticínios">🧀 Laticínios</option>
          <option value="❄️ Congelados">❄️ Congelados</option>
        </select>
      </div>
      <div class="add-bottom">
        <input id="inp-qty" placeholder="Qtd (ex: 2 kg)" autocomplete="off">
        <input id="inp-price" placeholder="Preço (R$)" type="number" step="0.01" min="0">
        <button class="add-btn" onclick="addItem()">+ Adicionar</button>
      </div>
    </div>
  </div>

  <div class="quick-section">
    <div class="section-label">⭐ Favoritos</div>
    <div class="quick-chips" id="quick-chips"></div>
  </div>

  <div id="price-summary"></div>
  <div class="lists" id="list-container"></div>

</div>

<!-- Total bar -->
<div class="total-bar">
  <div>
    <div class="total-label">Total estimado</div>
    <div class="total-value" id="total-val">R$ 0,00</div>
  </div>
  <button class="clear-btn" onclick="clearBought()">Limpar comprados</button>
</div>

<!-- History panel -->
<div class="panel" id="panel-history">
  <div class="panel-header">
    <span>📋</span>
    <span class="panel-title">Histórico de compras</span>
    <button class="panel-close" onclick="closePanel('history')">✕</button>
  </div>
  <div id="hist-content" style="padding:8px 0"></div>
  <div style="padding:20px">
    <button class="add-btn" style="width:100%;padding:14px" onclick="saveCurrentList()">💾 Salvar lista atual</button>
  </div>
</div>

<!-- Compare panel -->
<div class="panel" id="panel-compare">
  <div class="panel-header">
    <span>🏷️</span>
    <span class="panel-title">Comparar preços</span>
    <button class="panel-close" onclick="closePanel('compare')">✕</button>
  </div>
  <div style="padding:16px 20px 0">
    <div class="add-card">
      <div class="add-row">
        <input id="cmp-prod" placeholder="Produto" autocomplete="off">
        <input id="cmp-mkt" placeholder="Mercado" autocomplete="off">
      </div>
      <div class="add-bottom">
        <input id="cmp-price" placeholder="Preço R$" type="number" step="0.01" min="0">
        <button class="add-btn" onclick="addCompare()">Adicionar</button>
      </div>
    </div>
  </div>
  <div id="compare-content" style="padding:8px 0"></div>
</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(r => console.log('SW registrado:', r.scope))
        .catch(e => console.log('SW falhou:', e));
    });
  }
</script>
</body>
</html>
